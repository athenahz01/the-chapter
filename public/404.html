<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing at this page — The Chapter</title>
  <meta name="description" content="This page doesn't exist. The library, however, does.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAF6F0;color:#1A1612;font-family:'DM Sans',sans-serif;
      min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{max-width:520px;text-align:center}
    .eyebrow{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#B8964E;margin-bottom:18px}
    h1{font-family:'Playfair Display',serif;font-size:clamp(30px,6vw,44px);font-weight:800;
      line-height:1.1;margin-bottom:16px;text-wrap:balance}
    .quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;line-height:1.6;
      color:#5A5248;margin-bottom:8px;text-wrap:pretty}
    .attr{font-size:12px;color:#8A7E73;margin-bottom:32px}
    .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    a.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;
      padding:11px 22px;border-radius:6px;text-decoration:none;
      transition:background .2s ease,border-color .2s ease,color .2s ease,transform .12s ease}
    .primary{background:#6B1D2A;color:#FAF6F0}
    .primary:hover{background:#8B2E3D;transform:translateY(-1px)}
    .ghost{border:1.5px solid #DDD5CA;color:#1A1612}
    .ghost:hover{border-color:#6B1D2A;color:#6B1D2A}
    a.btn:active{transform:translateY(1px) scale(.985)}
    a:focus-visible{outline:2px solid #6B1D2A;outline-offset:3px;border-radius:6px}
    @media (prefers-reduced-motion: reduce){*{transition-duration:.01ms !important}}
  </style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">Page not found</p>
    <h1>This chapter doesn't exist.</h1>
    <!-- Public domain: Moby-Dick (1851). Fitting for a page about being lost. -->
    <p class="quote">&ldquo;It is not down on any map; true places never are.&rdquo;</p>
    <p class="attr">Herman Melville, <em>Moby-Dick</em> &middot; Chapter 12</p>
    <div class="row">
      <a href="/app" class="btn primary">Browse the library</a>
      <a href="/" class="btn ghost">Back to the beginning</a>
    </div>
  </main>
</body>
</html>
